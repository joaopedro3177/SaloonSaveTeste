<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profissionais | Saloon Save</title>
  <script src="../../assets/js/theme.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/dashboard/base.css">
  <link rel="stylesheet" href="../../assets/css/dashboard/sidebar.css">
  <link rel="stylesheet" href="../../assets/css/dashboard/profissionais.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="dashboard-shell" data-root="../.." data-page="profissionais">
  <div id="header-container"></div>
  <div class="layout">
    <div id="sidebar-container"></div>

    <main class="content">
      <header class="content-header">
        <div>
          <span class="page-kicker"><i class="fas fa-user-tie"></i> Equipe</span>
          <h1>Profissionais</h1>
          <p class="page-lead" id="proCount">0 profissionais</p>
        </div>
        <div class="header-actions">
          <button class="btn-primary" id="openModal" type="button">
            <i class="fas fa-plus"></i> Novo profissional
          </button>
        </div>
      </header>

      <section class="profissionais-grid" id="profissionaisGrid"></section>
    </main>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle">Novo profissional</h3>
        <button class="close-sidebar" id="closeModal" type="button" aria-label="Fechar modal">
          <i class="fas fa-times"></i>
        </button>
      </div>

      <form id="proForm">
        <input type="hidden" id="editIndex">

        <div class="form-group">
          <label for="nomePro">Nome completo</label>
          <input type="text" id="nomePro" required placeholder="Ex: Joao Silva">
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="telPro">Telefone</label>
            <input type="text" id="telPro" placeholder="(00) 00000-0000">
          </div>
          <div class="form-group">
            <label for="emailPro">E-mail</label>
            <input type="email" id="emailPro" placeholder="contato@exemplo.com">
          </div>
        </div>

        <div class="form-row">
        <div class="form-group">
          <label for="cargoPro">Especialidade</label>
          <input type="text" id="cargoPro" placeholder="Ex: Cabeleireiro">
        </div>
          <div class="form-group">
            <label for="comissaoPro">Comissao (%)</label>
            <input type="number" id="comissaoPro" value="0" min="0" max="100">
          </div>
        </div>

        <div class="form-group">
          <label>Dias de trabalho</label>
          <div class="work-days-selector">
            <button type="button" class="day-btn" data-day="Seg">Seg</button>
            <button type="button" class="day-btn" data-day="Ter">Ter</button>
            <button type="button" class="day-btn" data-day="Qua">Qua</button>
            <button type="button" class="day-btn" data-day="Qui">Qui</button>
            <button type="button" class="day-btn" data-day="Sex">Sex</button>
            <button type="button" class="day-btn" data-day="Sab">Sab</button>
            <button type="button" class="day-btn" data-day="Dom">Dom</button>
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn-cancel" id="cancelBtn">Cancelar</button>
          <button type="submit" class="btn-save">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <div id="deleteModal" class="modal-overlay">
    <div class="modal confirm-modal">
      <div class="modal-header">
        <h3><i class="fas fa-triangle-exclamation" style="color: #ef4444;"></i> Excluir profissional</h3>
      </div>

      <p class="section-note">Tem certeza que deseja remover este profissional? Esta acao nao pode ser desfeita.</p>

      <div class="modal-footer" style="margin-top: 22px;">
        <button id="cancelDelete" class="btn-cancel" type="button">Cancelar</button>
        <button id="confirmDelete" class="btn-save" type="button" style="background: #ef4444;">Excluir</button>
      </div>
    </div>
  </div>

  <script src="../../assets/js/dashboard/layout.js"></script>
  <script src="../../assets/js/dashboard/profissionais.js"></script>
</body>
</html>
